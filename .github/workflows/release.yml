name: Release (GitHub Packages)

# 触发：push 到形如 v1.2.3 的 tag
# 流程（任一步失败 → 整个 release 中止，npm 不会被污染）：
#   1. lint + typecheck
#   2. tests
#   3. build (产物 + types)
#   4. 校验 package.json version 等于 tag
#   5. publish 到 GitHub Packages（npm.pkg.github.com）
#
# Auth：用 GitHub Actions 自动注入的 GITHUB_TOKEN（无需手动配 secret）。
#       repo settings → Actions → Workflow permissions 需开 "Read and write permissions"，
#       否则 GITHUB_TOKEN 没有 write:packages 权限。
#
# 关于 bench 退化检测：
#   不在 release 上 gate —— GitHub Actions hosted runner 跨次跑硬件不一致（相同 SHA
#   也能飘 ±60% QPS），把 bench 当 release 硬门会自伤。
#   bench 退化追踪走 .github/workflows/bench.yml（nightly + perf-sensitive PR），
#   信息性输出，不阻断发布。
#   要做真正的 release-blocking bench gate，需要自部 self-hosted runner 锁硬件。

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # release 不允许并发取消

permissions:
  contents: read
  packages: write # 发到 GitHub Packages 必需

jobs:
  release:
    name: Validate + publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Validate tag matches package.json version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VER="${TAG#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "tag_version=${TAG_VER}" >> $GITHUB_OUTPUT
          echo "pkg_version=${PKG_VER}" >> $GITHUB_OUTPUT
          if [ "${TAG_VER}" != "${PKG_VER}" ]; then
            echo "::error::tag version (${TAG_VER}) ≠ package.json version (${PKG_VER})"
            exit 1
          fi
          echo "✓ tag ${TAG} matches package.json ${PKG_VER}"

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          # actions/setup-node 写 ~/.npmrc 把 NODE_AUTH_TOKEN 接到 GitHub Packages
          registry-url: 'https://npm.pkg.github.com'
          scope: '@novel-isr'

      - name: Install engine deps
        run: pnpm install --frozen-lockfile

      # ─── Gate 1: 静态检查 ──────────────────────────────────────────
      - name: Type check
        run: pnpm run type-check

      - name: Lint (includes Prettier check via eslint-plugin-prettier)
        run: pnpm run lint

      # ─── Gate 2: 测试 ─────────────────────────────────────────────
      - name: Run tests
        run: pnpm run test

      # ─── Gate 3: 构建 ─────────────────────────────────────────────
      - name: Build engine
        run: pnpm run build

      - name: Verify dist contents
        run: |
          test -f dist/novel-isr.js
          test -f dist/novel-isr.cjs
          test -f dist/novel-isr.d.ts
          test -f dist/cli/cli.js
          echo "✓ dist artifacts present"

      # ─── Publish 到 GitHub Packages ────────────────────────────────
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # pnpm publish 读 ~/.npmrc 的 registry（actions/setup-node 已写入）
          # --no-git-checks 因为我们已经在 tag 上，不需要再校验 working tree
          # --access restricted 强制私有（GitHub Packages 默认私有，双保险）
          pnpm publish --no-git-checks --access restricted --tag latest

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ steps.version.outputs.tag }}
          path: |
            dist/
          retention-days: 90
