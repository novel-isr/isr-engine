name: Bench (perf regression gate)

# 设计：
#   - 不在每个 PR 跑（runner 时间昂贵），改为 dispatch + nightly + perf-sensitive 路径触发
#   - 用 bench/compare.mjs 对比 bench/baseline.json，退化 > 20% 阻断
#   - 没有 baseline 时（首次跑 / 新分支）自动 skip，避免空检验阻塞
#
# Fixture：bench/fixture/ —— 自带的最小 ISR 应用，无 sibling 依赖
#   GitHub Actions checkout 只拉本仓库就够跑，不需要 ../novel-rating-website

on:
  workflow_dispatch:
    inputs:
      tiers:
        description: 'concurrency tiers (comma-separated)'
        required: false
        default: '10,100,1000'
      duration:
        description: 'seconds per tier'
        required: false
        default: '15'
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）跑一次，捕获日常性能漂移
    - cron: '0 2 * * *'
  pull_request:
    paths:
      # 只在改了 perf-sensitive 文件时跑——其他 PR 不浪费 runner 时间
      - 'src/plugin/isrCacheStore.ts'
      - 'src/plugin/isrCacheMiddleware.ts'
      - 'src/rsc/**'
      - 'src/engine/**'
      - 'src/server/**'
      - 'src/middlewares/**'
      - 'src/cache/**'
      - 'bench/*.mjs'
      - 'bench/fixture/**'
      - 'bench/baseline.json'
      - '.github/workflows/bench.yml'

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Run bench + regression check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # bench 不能 fork PR 跑（需要 secrets / artifact 权限），且 fork PR 性能数没意义
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-${{ hashFiles('pnpm-lock.yaml', 'bench/fixture/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-pnpm-

      - name: Diagnostics
        run: |
          node --version
          pnpm --version
          which node
          which pnpm

      - name: Install engine deps
        run: pnpm install --frozen-lockfile

      - name: Build engine
        run: pnpm run build

      - name: Install bench-fixture deps
        working-directory: bench/fixture
        run: pnpm install --no-frozen-lockfile

      - name: Build bench-fixture
        working-directory: bench/fixture
        run: pnpm run build

      - name: Start bench-fixture in background
        working-directory: bench/fixture
        env:
          # 关键：关掉限流 —— autocannon 单 IP 模拟高并发会被 200/min 限流压成 99% 429
          # 这是 bench fixture 专用 env，生产部署绝不带
          BENCH_DISABLE_RATE_LIMIT: '1'
          PORT: '3000'
          NODE_ENV: 'production'
          SITE_URL: 'http://localhost:3000'
        run: |
          pnpm run start > /tmp/fixture.log 2>&1 &
          echo $! > /tmp/fixture.pid
          # 等服务起来：最多 30 秒
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "fixture up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "fixture failed to start in 30s; logs:"
          cat /tmp/fixture.log
          exit 1

      - name: Run bench
        env:
          BENCH_TIERS: ${{ github.event.inputs.tiers || '10,100,1000' }}
          BENCH_DURATION: ${{ github.event.inputs.duration || '8' }}
          BENCH_PATHS: '/,/about,/books/1'
          BENCH_OUTPUT: bench-current.json
          BENCH_RUNNER_ID: github-actions-ubuntu-latest-x64-node22
          BENCH_WARMUP_SECONDS: '3'
          BENCH_COOLDOWN_MS: '2000'
          BENCH_FAIL_ON_NON_2XX: '1'
        run: pnpm run bench

      - name: Compare against baseline (fail on regression)
        env:
          BENCH_P95_REGRESSION_PCT: '20'
          BENCH_QPS_REGRESSION_PCT: '15'
          BENCH_MAX_NON_2XX_RATE: '0'
        run: |
          if [ -f bench/baseline.json ]; then
            node bench/compare.mjs bench/baseline.json bench-current.json
          else
            echo "::warning::no baseline at bench/baseline.json — skipping regression check"
            echo "to seed: copy bench-current.json to bench/baseline.json and commit"
          fi

      - name: Stop bench-fixture
        if: always()
        run: |
          if [ -f /tmp/fixture.pid ]; then
            kill $(cat /tmp/fixture.pid) || true
          fi

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bench-current-${{ github.sha }}
          path: |
            bench-current.json
            /tmp/fixture.log
          retention-days: 30
