name: CI

# 触发：任何 push 到任何分支 + PR 到 main/develop
# 目的：feature 分支也跑 lint+typecheck+test，提早暴露问题。
#
# corepack 接管 pnpm（packageManager 字段是 source of truth）—— 确保所有
# pnpm 子进程都用 setup-node 设置的 Node 版本，不会回退到 runner system 默认。

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint + Type + Format + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack (pnpm via packageManager)
        run: corepack enable pnpm

      - name: Diagnostics
        run: |
          node --version
          pnpm --version
          which node
          which pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint (includes Prettier check via eslint-plugin-prettier)
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Enable corepack (pnpm via packageManager)
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
