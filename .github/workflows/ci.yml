name: CI

# 触发：任何 push 到任何分支 + PR 到 main/develop
# Node 版本由 package.json engines + .nvmrc 共同声明；CI 通过 setup-node
# 读取 .nvmrc。corepack 接管 pnpm（packageManager 字段是 source of truth）。

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint + Type + Format + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Diagnostics
        run: |
          node --version
          pnpm --version
          which node
          which pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint (includes Prettier check via eslint-plugin-prettier)
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
